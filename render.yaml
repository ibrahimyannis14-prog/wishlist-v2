services:
  - type: web
    name: wishlist-scraper
    runtime: python
    plan: free
    rootDir: backend
    region: frankfurt
    buildCommand: "pip install -r requirements.txt && scrapling install"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --timeout 60 --workers 2"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ALLOWED_ORIGIN
        value: "https://VOTRE-PSEUDO.github.io"   # <-- à remplacer par le domaine de votre GitHub Pages
      - key: ENABLE_SELF_PING
        value: "1"
      - key: SELF_PING_INTERVAL_SECONDS
        value: "600"
